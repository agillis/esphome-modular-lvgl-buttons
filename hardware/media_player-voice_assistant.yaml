---
# Media Player and voice assistant
# Uses Sendspin for multiroom audio and speaker_source for improved media playback
#
# Wake-word user-disable
# ----------------------
# Declares a `wake_word_user_disabled` global. When set true (e.g. by a UI
# long-press handler in a screen YAML), the three internal restarts of
# `micro_wake_word` (media_player.on_idle, voice_assistant.on_end,
# voice_assistant.on_client_connected) are skipped, so the wake word stays
# off until the user re-enables it.
#
# The corresponding `micro_wake_word.stop` is *not* gated — stopping is always
# safe and idempotent. Downstream UI that toggles the global is responsible
# for calling stop/start once at toggle time.
#
# Heard! pill flash
# -----------------
# When `ui/voice/indicator_pill.yaml` is included on the same device, the
# `on_wake_word_detected` action briefly flashes the pill green and writes
# "Heard!" so the user gets immediate visual confirmation that the wake word
# fired. The package's `text_sensor` will overwrite it with the next pipeline
# state (typically blue "Listening") within a second or two.
#
# These updates target the default widget IDs declared by the pill package
# (`voice_indicator` and `voice_indicator_label`). If the pill package is not
# included, ESPHome's compile-time validator will flag the missing IDs — in
# that case either include the pill package or remove the three lvgl.* lines
# inside `on_wake_word_detected:` below.

globals:
  # Sticky user toggle that suppresses internal wake-word restarts.
  # restore_value: true so the user's choice persists across reboots.
  - id: wake_word_user_disabled
    type: bool
    restore_value: true
    initial_value: 'false'

external_components:
  - source:
      type: git
      url: https://github.com/kahrendt/esphome
      ref: 7a6cf5c8472b7e2fa18ee0fc314f66a80d249e32
    components: [media_source, sendspin]
  - source:
      type: git
      url: https://github.com/esphome/esphome
      ref: ff8ce89556748509d7ee8724e12d9d43d3c8c1e8
    refresh: 0s
    components: [http_request]

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

media_source:
  - platform: http_request
    id: http_announcement_source
    buffer_size: 250000
  - platform: http_request
    id: http_media_source
    buffer_size: 500000
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
  - platform: speaker_source
    name: "Media Player"
    id: my_media_player
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
      sources:
        - http_announcement_source
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
      sources:
        - http_media_source
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0.5
    volume_max: 0.75
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - micro_wake_word.stop
            - voice_assistant.stop
            - wait_until:
                condition:
                  not:
                    microphone.is_capturing:
                timeout: 2s
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      if:
        condition:
          and:
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing:
                    id: my_media_player
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
    on_play:
      - logger.log: "Media player started playing, disabling microphone"
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - micro_wake_word.stop
            - voice_assistant.stop
            - wait_until:
                condition:
                  not:
                    microphone.is_capturing:
                timeout: 2s
    on_idle:
      - delay: 500ms
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_playing:
                      id: my_media_player
              - not:
                  media_player.is_announcing:
                      id: my_media_player
          then:
            - logger.log: "Media player idle, restarting wake word"
            - if:
                condition:
                  lambda: 'return !id(wake_word_user_disabled);'
                then:
                  - micro_wake_word.start:

sensor:
  - platform: template
    name: "Voice Assistant State"
    lambda: |-
      if (id(my_microphone).is_running()) {
        return 1;
      } else {
        return 0;
      }
    update_interval: 2s

text_sensor:
  - platform: template
    name: "Voice Assistant Status"
    id: voice_status
    update_interval: 5s
    lambda: |-
      if (id(my_microphone).is_running()) {
        return {"Listening"};
      } else {
        return {"Idle"};
      }

micro_wake_word:
  id: my_wake_word
  models:
    - model: alexa
  on_wake_word_detected:
    then:
      - logger.log: "Wake word detected"
      # Brief green flash on the voice indicator pill (if `ui/voice/indicator_pill.yaml`
      # is included on this device). Overwritten by the pipeline `text_sensor` shortly.
      - lvgl.label.update:
          id: voice_indicator_label
          text: "Heard!"
      - lvgl.widget.update:
          id: voice_indicator
          bg_color: 0x1B5E20
          border_color: 0x69F0AE
      - voice_assistant.start:
          wake_word: !lambda return wake_word;

voice_assistant:
  microphone: my_microphone
  media_player: my_media_player
  micro_wake_word: my_wake_word
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  conversation_timeout: 300s
  on_end:
    # Give the TTS announcement time to be queued and start playing
    - delay: 1s
    # Wait for any announcement or media to finish before restarting the mic
    - wait_until:
        condition:
          and:
            - not:
                media_player.is_announcing:
                    id: my_media_player
            - not:
                media_player.is_playing:
                    id: my_media_player
        timeout: 30s
    # Brief pause to let the speaker fully release the I2S bus
    - delay: 300ms
    - logger.log: "Voice assistant ended, restarting wake word"
    - if:
        condition:
          lambda: 'return !id(wake_word_user_disabled);'
        then:
          - micro_wake_word.start:
  on_client_connected:
    - if:
        condition:
          lambda: 'return !id(wake_word_user_disabled);'
        then:
          - micro_wake_word.start:
  on_client_disconnected:
    - micro_wake_word.stop:

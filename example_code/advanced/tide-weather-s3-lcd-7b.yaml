                  border_width: 0
                  pad_all: 0
                  scrollbar_mode: "OFF"
                  indicator:
                    opa: TRANSP
                  scales:
                    - range_from: 0
                      range_to: 100
                      angle_range: 360
                      rotation: 0
                      indicators:
                        - image:
                            id: tide_level
                            src: tide_dial_needle_img
                            pivot_x: 194
                            pivot_y: 194
                            value: 0
              # Rising/Falling label — centered under the dial (dial box x612..1000),
              # baseline aligned with the meter's TIDE LEVEL caption.
              - label:
                  id: tide_state_label
                  align: TOP_LEFT
                  x: 612
                  y: 585
                  width: 388
                  text_align: CENTER
                  text_font: plex_11
                  text_color: 0x5FD4F4
                  text: "TIDE RISING"

              # ── high/low height labels (module-driven; hidden — the meter top/bottom
              #    labels convey these values in the design; these only satisfy the
              #    local_tide_update.yaml binding contract) ──
              - label: { id: high_tide_height, hidden: true, align: TOP_LEFT, x: 596, y: 84, text_font: plex_11, text_color: 0x7C90A5, text: "0.0 ft" }
              - label: { id: low_tide_height,  hidden: true, align: TOP_LEFT, x: 596, y: 100, text_font: plex_11, text_color: 0x7C90A5, text: "0.0 ft" }

              # ── Settings gear → diagnostics page (bottom-right corner) ──
              - button:
                  id: diag_gear_btn
                  align: BOTTOM_RIGHT
                  x: -12
                  y: -12
                  width: 42
                  height: 42
                  radius: 21
                  bg_color: 0x141C28
                  bg_opa: COVER
                  border_color: 0x2A3644
                  border_width: 1
                  shadow_width: 0
                  pad_all: 0
                  on_click:
                    - lvgl.page.show: diag_page
                  widgets:
                    - label:
                        align: CENTER
                        text_font: mdi_diag
                        text_color: 0x8FA3B8
                        text: "\U000F0493"

    # ══════════════════════════════════════════════════════════════════════
    # Diagnostics page — reached via the gear; X (top-right) returns to main.
    # Mirrors the key entries from the web UI's Diagnostic section on-device.
    # ══════════════════════════════════════════════════════════════════════
    - id: diag_page
      bg_color: 0x0B1420
      scrollbar_mode: "OFF"
      on_load:
        - script.execute: diag_refresh
      widgets:
        - label:
            align: TOP_LEFT
            x: 40
            y: 30
            text_font: sg_25
            text_color: 0xE9EEF4
            text: "Diagnostics"

        # Close (X) → back to the main page
        - button:
            id: diag_close_btn
            align: TOP_RIGHT
            x: -16
            y: 16
            width: 46
            height: 46
            radius: 23
            bg_color: 0x141C28
            bg_opa: COVER
            border_color: 0x2A3644
            border_width: 1
            shadow_width: 0
            pad_all: 0
            on_click:
              - lvgl.page.show: main_page
            widgets:
              - label:
                  align: CENTER
                  text_font: mdi_diag
                  text_color: 0xE9EEF4
                  text: "\U000F0156"

        # ── Left column ──
        - label: { align: TOP_LEFT, x: 40, y: 96,  text_font: plex_11, text_color: 0x7C90A5, text: "DEVICE" }
        - label: { id: diag_name,   align: TOP_LEFT, x: 40, y: 114, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 40, y: 156, text_font: plex_11, text_color: 0x7C90A5, text: "FIRMWARE" }
        - label: { id: diag_fw,     align: TOP_LEFT, x: 40, y: 174, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 40, y: 216, text_font: plex_11, text_color: 0x7C90A5, text: "BUILD" }
        - label: { id: diag_built,  align: TOP_LEFT, x: 40, y: 234, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 40, y: 276, text_font: plex_11, text_color: 0x7C90A5, text: "UPTIME" }
        - label: { id: diag_uptime, align: TOP_LEFT, x: 40, y: 294, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 40, y: 336, text_font: plex_11, text_color: 0x7C90A5, text: "FREE RAM (INTERNAL)" }
        - label: { id: diag_heap,   align: TOP_LEFT, x: 40, y: 354, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 40, y: 396, text_font: plex_11, text_color: 0x7C90A5, text: "FREE PSRAM" }
        - label: { id: diag_psram,  align: TOP_LEFT, x: 40, y: 414, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }

        # ── Right column ──
        - label: { align: TOP_LEFT, x: 540, y: 96,  text_font: plex_11, text_color: 0x7C90A5, text: "WIFI SSID" }
        - label: { id: diag_ssid,    align: TOP_LEFT, x: 540, y: 114, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 540, y: 156, text_font: plex_11, text_color: 0x7C90A5, text: "IP ADDRESS" }
        - label: { id: diag_ip,      align: TOP_LEFT, x: 540, y: 174, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 540, y: 216, text_font: plex_11, text_color: 0x7C90A5, text: "MAC ADDRESS" }
        - label: { id: diag_mac,     align: TOP_LEFT, x: 540, y: 234, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 540, y: 276, text_font: plex_11, text_color: 0x7C90A5, text: "WIFI STRENGTH" }
        - label: { id: diag_wifi,    align: TOP_LEFT, x: 540, y: 294, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 540, y: 336, text_font: plex_11, text_color: 0x7C90A5, text: "CPU TEMPERATURE" }
        - label: { id: diag_cpu,     align: TOP_LEFT, x: 540, y: 354, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }
        - label: { align: TOP_LEFT, x: 540, y: 396, text_font: plex_11, text_color: 0x7C90A5, text: "LAST RESTART" }
        - label: { id: diag_restart, align: TOP_LEFT, x: 540, y: 414, text_font: plex_16, text_color: 0xE9EEF4, text: "\xE2\x80\x94" }

        # Footer hint
        - label:
            align: BOTTOM_LEFT
            x: 40
            y: -22
            text_font: plex_13
            text_color: 0x5FD4F4
            text: "Full sensor list: built-in web UI \xC2\xB7 Diagnostic section"

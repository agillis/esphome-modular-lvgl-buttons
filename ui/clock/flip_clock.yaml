---
# Flip Clock Widget - Modern Tide Dashboard Style
#
# vars:
#    uid:
#    page_id:      parent page id (default "main_page")
#    row:
#    column:
#    row_span:
#    column_span:
#    click_page:
#    font_size:    digit size in px (default 54)
#    height:       inner clock height within the cell, e.g. "100%" or "200" (default "100%")
#    style:        "black" (default) or "white"  (kept for var-contract compatibility)
#    show_date:    true/false (default false) - render an uppercase date line below the cards
#
# Two split-gradient cards (hour + minute) with an aqua blinking colon between them.
# "AM"/"PM" sits at the bottom-left of the hour card. An optional date line renders below.
#
# Label IDs updated by the "!extend time_update" script:
#    flip_hour_label, flip_min_label, flip_am_label, flip_pm_label, flip_colon, flip_date
#
# NOTE: every font this module needs is declared locally below - it never depends on
# fonts declared in the host dashboard.

font:
  # Digits - Space Grotesk @600 at the requested digit size
  - file: "gfonts://Space+Grotesk@600"
    id: flip_sg_font
    size: ${font_size | default(54)}
    bpp: 4
    glyphs: "0123456789"

  # Aqua colon between the two cards (~34px)
  - file: "gfonts://Space+Grotesk@600"
    id: flip_colon_font
    size: 34
    bpp: 4
    glyphs: ":"

  # AM / PM indicator (small)
  - file: "gfonts://Space+Grotesk@600"
    id: flip_ampm_font
    size: 11
    bpp: 4
    glyphs: "AMP"

  # Optional date line (IBM Plex Sans @500, uppercase)
  - file: "gfonts://IBM+Plex+Sans@500"
    id: flip_date_font
    size: 12
    bpp: 4
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789, "

globals:
  # Drives the blinking colon (toggled by the interval below)
  - id: flip_colon_on
    type: bool
    restore_value: no
    initial_value: "true"

lvgl:
  gradients:
    - id: flip_card_gradient
      direction: ver
      stops:
        - color: 0x1B2634
          position: 0
        - color: 0x141D29
          position: 255

  style_definitions:
    - id: flip_card_style
      bg_grad: flip_card_gradient
      bg_grad_dir: ver
      bg_opa: cover
      radius: 12
      border_width: 1
      border_color: 0x2A3644
      pad_all: 0
      scrollbar_mode: "OFF"

    - id: flip_digit_style
      text_font: flip_sg_font
      text_color: 0xE9EEF4
      align: center

    - id: flip_outer_style
      bg_opa: TRANSP

    - id: flip_colon_style
      text_font: flip_colon_font
      text_color: 0x5FD4F4

    - id: flip_ampm_style
      text_font: flip_ampm_font
      text_color: 0x7C90A5

    - id: flip_date_style
      text_font: flip_date_font
      text_color: 0x7C90A5

  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - obj:
            id: ${uid}
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            styles: flip_outer_style
            scrollbar_mode: "OFF"
            scrollable: false
            pad_all: 0
            on_short_click:
              then:
                lvgl.page.show: ${click_page | default("main_page")}
            widgets:
              # Column: [ clock row ] then optional [ date line ]
              - obj:
                  width: 100%
                  height: ${height | default("100%")}
                  align: CENTER
                  bg_opa: TRANSP
                  pad_all: 2
                  scrollbar_mode: "OFF"
                  scrollable: false
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: CENTER
                    flex_align_cross: CENTER
                    flex_align_track: CENTER
                  widgets:
                    # ── Clock row: hour card, colon, minute card ──
                    - obj:
                        width: 100%
                        flex_grow: 1
                        bg_opa: TRANSP
                        pad_all: 0
                        scrollbar_mode: "OFF"
                        scrollable: false
                        layout:
                          type: FLEX
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          flex_align_track: CENTER
                          pad_column: 6
                        widgets:
                          # ── Hour card ──
                          - obj:
                              styles: flip_card_style
                              flex_grow: 1
                              height: 100%
                              scrollable: false
                              widgets:
                                - label:
                                    id: flip_hour_label
                                    styles: flip_digit_style
                                    align: CENTER
                                    text: "12"
                                - label:
                                    id: flip_am_label
                                    styles: flip_ampm_style
                                    align: BOTTOM_LEFT
                                    x: 6
                                    y: -6
                                    text: "AM"
                                - label:
                                    id: flip_pm_label
                                    styles: flip_ampm_style
                                    align: BOTTOM_LEFT
                                    x: 6
                                    y: -6
                                    text: "PM"
                                    hidden: true

                          # ── Aqua blinking colon ──
                          - label:
                              id: flip_colon
                              styles: flip_colon_style
                              text: ":"

                          # ── Minute card ──
                          - obj:
                              styles: flip_card_style
                              flex_grow: 1
                              height: 100%
                              scrollable: false
                              widgets:
                                - label:
                                    id: flip_min_label
                                    styles: flip_digit_style
                                    align: CENTER
                                    text: "00"

                    # ── Optional date line ──
                    - label:
                        id: flip_date
                        styles: flip_date_style
                        text: ""
                        hidden: ${"false" if show_date | default(false) else "true"}

interval:
  # Blink the colon (~2 s period: on 1 s, off 1 s)
  - interval: 1s
    then:
      - lambda: 'id(flip_colon_on) = !id(flip_colon_on);'
      - if:
          condition:
            lambda: 'return id(flip_colon_on);'
          then:
            - lvgl.widget.update:
                id: flip_colon
                text_opa: 100%
          else:
            - lvgl.widget.update:
                id: flip_colon
                text_opa: 0%

script:
  - id: !extend time_update
    then:
      - lvgl.label.update:
          id: flip_hour_label
          text: !lambda |-
            if (!id(system_time).now().is_valid()) return std::string("12");
            int h = id(system_time).now().hour % 12;
            if (h == 0) h = 12;
            return std::to_string(h);
      - lvgl.label.update:
          id: flip_min_label
          text: !lambda |-
            if (!id(system_time).now().is_valid()) return std::string("00");
            return str_sprintf("%02d", id(system_time).now().minute);
      - if:
          condition:
            lambda: 'return id(system_time).now().is_valid() && id(system_time).now().hour >= 12;'
          then:
            - lvgl.widget.show: flip_pm_label
            - lvgl.widget.hide: flip_am_label
          else:
            - lvgl.widget.show: flip_am_label
            - lvgl.widget.hide: flip_pm_label
      - lvgl.label.update:
          id: flip_date
          text: !lambda |-
            auto t = id(system_time).now();
            if (!t.is_valid()) return std::string("");
            // e.g. "SATURDAY, JULY 18" — no leading zero on single-digit days
            std::string s = t.strftime("%A, %B ") + std::to_string(t.day_of_month);
            for (auto & c : s) c = toupper(c);
            return s;
